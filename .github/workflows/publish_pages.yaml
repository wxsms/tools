name: CD

on:
  push:
    branches:
      - master

jobs:
  deploy_gh_pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-chromium@v1
      - run: echo "PUPPETEER_EXECUTABLE_PATH=$(which chromium)" >> "$GITHUB_ENV"
      - run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - run: npm run build
        env:
          VITE_SITE_URL: https://tools.wxsm.space
      - run: cp dist/index.html dist/404.html
      - name: GitHub Pages
        uses: crazy-max/ghaction-github-pages@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          target_branch: gh-pages
          build_dir: dist
          jekyll: false
          fqdn: tools.wxsm.space
